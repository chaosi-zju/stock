name: Daily Job

on:
  # 一个用户对应一个 cron：每次 schedule 触发后，只会命中对应用户的 job。
  # 这里不再重复写 steps，而是通过复用 workflow：.github/workflows/reusable-hjd-login.yml
  #
  # GitHub 限制：单个 workflow 最多 20 条 schedule。
  schedule:
    # 00:10 北京时间 (UTC 16:10)
    - cron: '10 16 * * *'
    - cron: '10 17 * * *'
    - cron: '10 18 * * *'
    - cron: '10 19 * * *'
    - cron: '10 20 * * *'
    - cron: '10 21 * * *'
    - cron: '10 22 * * *'
    - cron: '10 23 * * *'
    - cron: '10 00 * * *'
    - cron: '10 01 * * *'
    - cron: '10 02 * * *'
    - cron: '10 03 * * *'

jobs:
  hjd-user-0:
    name: hjd user 0
    if: github.event_name == 'schedule' && github.event.schedule == '10 16 * * *'
    uses: ./.github/workflows/reusable-hjd-login.yml
    with:
      forum_username: 神树通天
      user_index: '0'
    secrets: inherit

  hjd-user-1:
    name: hjd user 1
    if: github.event_name == 'schedule' && github.event.schedule == '10 17 * * *'
